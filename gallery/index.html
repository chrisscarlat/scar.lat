<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chris Scarlat — Curve Gallery</title>
  <meta name="description" content="A WebGL curve gallery — scroll along a curve of images.">
  <link rel="icon" href="../fav/fav.ico" sizes="any">
  <link rel="icon" href="../fav/fav.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    body { font-family: 'Inter', Helvetica, Arial, sans-serif; }

    #canvas-container { position: fixed; inset: 0; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* --- Top bar: site name + back link --- */
    .cg-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 3;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px; text-transform: uppercase; font-size: 14px; font-weight: 600;
      letter-spacing: .01em; mix-blend-mode: difference; color: #fff;
    }
    .cg-top a { color: inherit; text-decoration: none; }
    .cg-top a:hover { opacity: .7; }
    .cg-top .cg-back { display: inline-flex; align-items: center; gap: 8px; }

    /* --- Auto/scroll toggle (bottom centre) --- */
    .scroll-toggle {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 3;
      padding: .65rem 1.5rem; border: 1px solid rgba(0,0,0,.15); border-radius: 999px;
      background: rgba(255,255,255,.62); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #2a2a28; font-family: inherit; font-size: .82rem; letter-spacing: .04em;
      text-transform: uppercase; cursor: pointer; transition: all .2s ease;
    }
    .scroll-toggle:hover { background: rgba(255,255,255,.9); }
    .scroll-toggle.active { background: #16161a; color: #f0ede8; border-color: #16161a; }

    /* --- Pattern switcher (bottom left) --- */
    .btns-container {
      position: fixed; bottom: 1.6rem; left: 1.6rem; z-index: 3;
      display: flex; flex-direction: column; gap: 6px;
      padding: 6px; border-radius: 12px;
      background: rgba(255,255,255,.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .path-btn {
      padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: #4f4f4f;
      background: none; border: none; border-radius: 8px; text-align: left; font-family: inherit;
      transition: background .2s ease, color .2s ease;
    }
    .path-btn:hover { background: rgba(0,0,0,.06); color: #16161a; }
    .path-btn.active { background: #16161a; color: #fff; }

    .cg-hint {
      position: fixed; bottom: 24px; right: 28px; z-index: 3;
      font-size: 12px; color: #8a8a85; letter-spacing: .02em; user-select: none;
    }
    @media (max-width: 640px) { .cg-hint { display: none; } }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.184.0",
      "gsap": "https://esm.sh/gsap@3.15.0",
      "gsap/Observer": "https://esm.sh/gsap@3.15.0/Observer"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container"></div>

  <header class="cg-top notranslate" translate="no">
    <a href="https://scar.lat" class="cg-back">← Chris Scarlat</a>
    <span>Curve Gallery</span>
  </header>

  <button id="scroll-toggle" class="scroll-toggle" type="button">Scroll</button>

  <div class="btns-container">
    <button class="path-btn active" data-path="0">Pattern 1</button>
    <button class="path-btn" data-path="1">Pattern 2</button>
    <button class="path-btn" data-path="2">Pattern 3</button>
    <button class="path-btn" data-path="3">Pattern 4</button>
    <button class="path-btn" data-path="4">Pattern 5</button>
  </div>

  <div class="cg-hint">Scroll / drag to move along the curve</div>

  <script type="module">
    import * as THREE from 'three'
    import { gsap } from 'gsap'
    import { Observer } from 'gsap/Observer'

    gsap.registerPlugin(Observer)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    document.getElementById('canvas-container').appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0xffffff)
    scene.fog = new THREE.Fog(0xffffff, 10, 40)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200)

    const SCALE = 16          // the curve is defined in Blender units; scale it for the scene
    const TEX_VARIANTS = 19   // number of images in ./img
    const textureLoader = new THREE.TextureLoader()
    const textures = loadTextureVariants(TEX_VARIANTS, textureLoader)

    const TOTAL = 500         // total number of planes along the curve
    const CAM_Z = 10          // camera offset along Z
    const FOCUS_DIST = 5.5    // distance at which planes start to scale up
    const MAX_SCALE = 14      // max scale factor for focused planes
    const Z_GATE = 11         // depth cull to avoid needless work

    const LATERAL_OFFSET_RANGE = [-1, 1]
    const DEPTH_OFFSET_RANGE = [-0.75, 0.75]
    const SIZE_RANGE = [0.18, 0.4]

    function randomBetween(min, max) { return min + Math.random() * (max - min) }

    function toScaledVector3([x, y, z], scale) {
      return new THREE.Vector3(x * scale, y * scale, z * scale)
    }

    function loadTextureVariants(count, loader) {
      return Array.from({ length: count }, (_, i) => loader.load(`./img/${i + 1}.webp`))
    }

    // reconstruct a curve from the exported Blender points
    function buildCurve(raw) {
      const points = raw.map(p => toScaledVector3(p, SCALE))
      return new THREE.CatmullRomCurve3(points, true, 'catmullrom', 0.5)
    }

    // returns position and local normal (nx, ny) at a given point on the curve
    function getCurveFrame(curve, t) {
      const pos = curve.getPoint(t)
      const tangent = curve.getTangent(t)
      return { pos, nx: -tangent.y, ny: tangent.x }
    }

    async function init() {
      const files = ['path1', 'path2', 'path3', 'path4', 'path5']
      const allRaws = await Promise.all(
        files.map(name => fetch(`./paths/${name}.json`).then(r => r.json()))
      )

      let currentPathIndex = 0
      let curve = buildCurve(allRaws[0])

      // convert the focus distance to a t-based threshold relative to the curve length
      let focusTGate = (FOCUS_DIST * 1.5) / curve.getLength()

      function createScaleAnimator(mesh) {
        const proxy = { value: 1 }
        return gsap.quickTo(proxy, 'value', {
          duration: 0.4,
          ease: 'power3.out',
          onUpdate: () => mesh.scale.setScalar(proxy.value),
        })
      }

      const planes = []

      for (let i = 0; i < TOTAL; i++) {
        const t = i / TOTAL // distribute planes evenly along the curve
        const { pos, nx, ny } = getCurveFrame(curve, t)

        const lateralOffset = randomBetween(...LATERAL_OFFSET_RANGE)
        const depthOffset = randomBetween(...DEPTH_OFFSET_RANGE)
        const size = randomBetween(...SIZE_RANGE)

        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(size, size),
          new THREE.MeshBasicMaterial({
            map: textures[Math.floor(Math.random() * TEX_VARIANTS)],
            side: THREE.DoubleSide,
          })
        )

        mesh.position.set(
          pos.x + nx * lateralOffset,
          pos.y + ny * lateralOffset,
          pos.z + depthOffset
        )

        mesh.userData.t = t
        mesh.userData.lateralOffset = lateralOffset
        mesh.userData.depthOffset = depthOffset
        mesh.userData.setScale = createScaleAnimator(mesh)

        planes.push(mesh)
        scene.add(mesh)
      }

      function redistributePlanes(newCurve) {
        planes.forEach((mesh) => {
          const t = mesh.userData.t
          const { pos, nx, ny } = getCurveFrame(newCurve, t)
          gsap.to(mesh.position, {
            x: pos.x + nx * mesh.userData.lateralOffset,
            y: pos.y + ny * mesh.userData.lateralOffset,
            z: pos.z + mesh.userData.depthOffset,
            duration: 1.4,
            ease: 'power3.inOut',
          })
        })
      }

      function computeFocusScale(distance, maxDistance, maxScale) {
        const f = 1 - distance / maxDistance
        return 1 + f ** 3 * (maxScale - 1)
      }

      // proxy object to let GSAP animate the camera's t position
      const camProxy = { t: 0 }
      const setCamT = gsap.quickTo(camProxy, 't', { duration: 1, ease: 'power3.out' })

      let targetT = 0
      const SENSITIVITY = 0.8 / (window.innerHeight * 4)

      Observer.create({
        target: window,
        type: 'wheel,touch,pointer',
        onChange: (self) => {
          if (autoScroll) return
          targetT += self.deltaY * SENSITIVITY
          setCamT(targetT)
        },
      })

      const AUTO_SCROLL_DURATION = 10
      const AUTO_T_PER_SEC = 1 / AUTO_SCROLL_DURATION
      let autoScroll = false

      const camPos = { x: 0, y: 0, z: 0 }

      const scrollToggleBtn = document.getElementById('scroll-toggle')
      scrollToggleBtn.addEventListener('click', () => {
        autoScroll = !autoScroll
        scrollToggleBtn.classList.toggle('active', autoScroll)
        scrollToggleBtn.textContent = autoScroll ? 'Auto' : 'Scroll'
      })

      document.querySelectorAll('.path-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.path)
          if (idx === currentPathIndex) return

          currentPathIndex = idx
          document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'))
          btn.classList.add('active')

          const newCurve = buildCurve(allRaws[idx])
          redistributePlanes(newCurve)
          curve = newCurve

          focusTGate = (FOCUS_DIST * 1.5) / newCurve.getLength()

          const t = ((1 - camProxy.t) % 1 + 1) % 1
          const target = newCurve.getPoint(t)

          gsap.killTweensOf(camPos)
          gsap.to(camPos, {
            x: target.x,
            y: target.y,
            z: target.z + CAM_Z,
            duration: 1.4,
            ease: 'power3.inOut',
          })
        })
      })

      let lastTime = performance.now()

      function animate() {
        requestAnimationFrame(animate)

        const now = performance.now()
        const delta = (now - lastTime) / 1000
        lastTime = now

        if (autoScroll) {
          targetT += AUTO_T_PER_SEC * delta
          setCamT(targetT)
        }

        const t = ((1 - camProxy.t) % 1 + 1) % 1

        const pathPos = curve.getPoint(t)
        if (!gsap.isTweening(camPos)) {
          camPos.x = pathPos.x
          camPos.y = pathPos.y
          camPos.z = pathPos.z + CAM_Z
        }
        camera.position.set(camPos.x, camPos.y, camPos.z)

        for (const plane of planes) {
          const dx = camera.position.x - plane.position.x
          const dy = camera.position.y - plane.position.y
          const dz = Math.abs(camera.position.z - plane.position.z)
          const distXY = Math.sqrt(dx * dx + dy * dy)

          let dt = Math.abs(plane.userData.t - t)
          if (dt > 0.5) dt = 1 - dt

          const isInFocusZone = dt < focusTGate && dz < Z_GATE && distXY < FOCUS_DIST
          const targetScale = isInFocusZone ? computeFocusScale(distXY, FOCUS_DIST, MAX_SCALE) : 1

          plane.userData.setScale(targetScale)
        }

        renderer.render(scene, camera)
      }

      animate()
    }

    init()

    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight
      camera.aspect = w / h
      camera.updateProjectionMatrix()
      renderer.setSize(w, h)
    })
  </script>
</body>
</html>

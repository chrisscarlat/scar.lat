  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const chatInput = document.querySelector('.chat-input');
      const chatSend = document.querySelector('.chat-send');
      const chatMessages = document.querySelector('.chat-messages');
      const budgetSelector = document.querySelector('.budget-selector');
      const contactForm = document.querySelector('.contact-form');
      const chatToggle = document.querySelector('.chat-toggle');
      const chatWindow = document.querySelector('.chat-window');
      const chatClose = document.querySelector('.chat-close');
      const chatWidget = document.querySelector('.chat-widget');

      // Hide the old form - we'll use chat instead
      if (contactForm) contactForm.style.display = 'none';

      chatToggle.addEventListener('click', () => {
        chatWidget.classList.add('open');
      });

      chatClose.addEventListener('click', () => {
        chatWidget.classList.remove('open');
      });

      // Conversation state
      let state = 'intro'; // intro, select_project, chatting, asking_details, asking_name, asking_brand, asking_role, asking_email, asking_budget, done
      let collectedInfo = { name: '', brand: '', role: '', contact: '', contactMethod: '', budget: '', projectType: '', projectDetails: [] };
      let messageCount = 0;
      let mentionedSmallBudget = false;
      let usedResponses = [];

      // Keywords for detection
      const smallBudgetKeywords = ['small budget', 'limited budget', 'tight budget', 'not much money', 'low budget', 'minimal budget', 'cheap', 'affordable', 'kleines budget', 'wenig geld'];
      const greetingKeywords = ['hey', 'hi', 'hello', 'hallo', 'good morning', 'good afternoon', 'good evening', 'yo', 'hola', 'sup', 'wassup', 'whats up'];
      const funnyKeywords = ['haha', 'lol', 'lmao', 'rofl', '😂', '🤣', '😄', '😆', 'joke', 'funny', 'kidding', 'jk'];
      const rudeKeywords = ['stupid', 'dumb', 'idiot', 'suck', 'hate', 'worst', 'terrible', 'awful'];
      const complimentKeywords = ['amazing', 'awesome', 'great work', 'love your', 'beautiful', 'impressive', 'talented', 'incredible'];
      const budgetKeywords = ['budget', 'price', 'cost', 'rate', 'pricing', 'money', 'euro', 'eur', '€', 'how much', 'preis', 'kosten'];

      // Detect if user mentions a specific low amount
      function detectLowBudgetAmount(text) {
        const lower = text.toLowerCase();
        // Match patterns like: 300 eur, €500, 1000 euro, 2k, €1.5k, etc.
        const patterns = [
          /(\d+(?:[\.,]\d+)?)\s*(?:€|eur|euro|euros)/i,
          /€\s*(\d+(?:[\.,]\d+)?)/i,
          /(\d+(?:[\.,]\d+)?)\s*k\b/i,
          /(\d+(?:[\.,]\d+)?)\s*(?:dollar|usd|\$)/i
        ];
        for (let p of patterns) {
          const match = text.match(p);
          if (match) {
            let amount = parseFloat(match[1].replace(',', '.'));
            // Check if it's in "k" format
            if (/k\b/i.test(text) && amount < 100) amount *= 1000;
            // Consider < 5000 as low budget
            if (amount < 5000) return amount;
          }
        }
        return null;
      }

      const lowBudgetResponses = [
        "Haha, I love the honesty! With that budget, we could create some amazing concepts with Midjourney. What do you think?",
        "I hear you! For that budget, we can explore some creative ideas using Midjourney. It's a great tool for quick and beautiful results.",
        "Got it! That's a perfect budget for a Midjourney exploration. We can generate a bunch of cool visuals for your project.",
      ];

      // Project types
      const projectTypes = [
        { id: 'new-project', label: '🚀 New Project' },
        { id: 'other', label: '🤔 Something else' }
      ];

      // Witty responses
      const funnyResponses = [
        "Ha! I like you already. But let's focus – what are we building? 😄",
        "Alright comedian, I see you! Now what project brought you here?",
        "LOL okay okay, I appreciate the humor! So what's the real mission?",
        "That made me smile! Now let's make something that makes others smile too.",
        "You're fun! I've worked with serious corporates for too long. What are we creating?",
        "Haha nice one! Okay, business mode: what do you need designed?"
      ];

      const rudeResponses = [
        "Ouch! 25 years in the game and I've heard worse. What do you actually need?",
        "Well that's... direct. Let's channel that energy into a project instead?",
        "I've survived design feedback from German engineers. I can handle this. What's up?",
        "Bold opener! I respect it. Now what can I actually help you with?"
      ];
      
      const complimentResponses = [
        "Thank you! 25 years and 4 continents of practice helps. What can I create for you?",
        "That's so kind! Now let me earn that compliment – what are we building?",
        "Appreciate it! Let's make something amazing together. What's the project?",
        "Thanks! I've been fortunate to work with incredible brands. Want to add yours to the list?"
      ];

      const greetingResponses = [
        "Hey! Nice to meet you. I've got some ideas brewing already... what brings you here?",
        "Hello! Always exciting to meet someone new. What are you working on?",
        "Hi there! I'm Chris – 25 years designing, still can't draw a straight line by hand. What can I help with?",
        "Hey! Welcome! Let me guess... you need something designed? 😉"
      ];

      const generalFollowUps = [
        "Interesting! Tell me more – who's this for?",
        "Got it! What's the main problem we're solving?",
        "Nice! How soon do you need this?",
        "Cool! What makes your project unique?",
        "I see! Who's the competition we're beating?"
      ];

      const DISCOUNT_PERCENTAGE = 0.30; // 30% discount

      function detectIntent(text) {
        const lower = text.toLowerCase().trim();

        // Very short gibberish
        if (lower.length <= 2) return 'funny';
        if (!/[aeiou]/i.test(lower) && lower.length > 3) return 'funny';
        if (/^[^a-z]*$/i.test(lower)) return 'funny';

        // Check for low budget amount first
        const lowAmount = detectLowBudgetAmount(text);
        if (lowAmount !== null) return 'low_budget';

        // Check keywords
        if (rudeKeywords.some(k => lower.includes(k))) return 'rude';
        if (complimentKeywords.some(k => lower.includes(k))) return 'compliment';
        if (funnyKeywords.some(k => lower.includes(k))) return 'funny';
        if (greetingKeywords.some(k => lower === k || lower.startsWith(k + ' ') || lower.startsWith(k + '!'))) return 'greeting';
        if (budgetKeywords.some(k => lower.includes(k))) return 'budget';
        if (lower.includes('brand')) return 'brand';
        if (lower.includes('website') || lower.includes('web') || lower.includes('site')) return 'website';
        if (lower.includes('app') || lower.includes('mobile')) return 'app';
        if (lower.includes('?')) return 'question';

        return 'general';
      }

      function getRandomResponse(arr) {
        const available = arr.filter(r => !usedResponses.includes(r));
        const options = available.length > 0 ? available : arr;
        const response = options[Math.floor(Math.random() * options.length)];
        usedResponses.push(response);
        if (usedResponses.length > 8) usedResponses.shift();
        return response;
      }

      function addMessage(text, type, isHtml = false) {
        const msg = document.createElement('div');
        msg.className = 'message ' + type + '-message';
        if (type === 'bot') {
          const avatar = document.createElement('img');
          avatar.src = 'https://scar.lat/signature/chris-scarlat.gif';
          avatar.alt = 'Chris';
          avatar.className = 'bot-avatar';
          msg.appendChild(avatar);
        }
        const content = document.createElement('div');
        content.className = 'message-content';
        content.innerHTML = isHtml ? text : '<p>' + text + '</p>';
        msg.appendChild(content);
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function addMessageTyping(text, isHtml = false, callback = null) {
        const typing = document.createElement('div');
        typing.className = 'message bot-message typing-indicator';
        typing.innerHTML = '<img src="https://scar.lat/signature/chris-scarlat.gif" alt="Chris" class="bot-avatar"><div class="message-content"><p>...</p></div>';
        chatMessages.appendChild(typing);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        setTimeout(() => {
          typing.remove();
          addMessage(text, 'bot', isHtml);
          if (callback) callback();
        }, 600 + Math.random() * 400);
      }

      function showProjectTypes() {
        let btnsHtml = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;">';
        projectTypes.forEach(p => {
          btnsHtml += `<button class="project-type-btn" data-type="${p.id}" style="padding:10px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all 0.2s;">${p.label}</button>`;
        });
        btnsHtml += '</div>';

        const html = `<p>What are we building together?</p>${btnsHtml}`;
        addMessageTyping(html, true, () => {
          document.querySelectorAll('.project-type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const typeId = this.dataset.type;
              const type = projectTypes.find(p => p.id === typeId);
              collectedInfo.projectType = type.label;
              addMessage(type.label, 'user');
              state = 'chatting';

              if (typeId === 'other') {
                setTimeout(() => addMessageTyping("Intriguing! I love unusual projects. Tell me what you have in mind."), 400);
              } else {
                const responses = [
                  `${type.label.split(' ')[0]} - Nice choice! Tell me a bit about it.`, 
                  `${type.label} – exciting! What's the story behind this project?`, 
                  `Love it! What's the vision?`, 
                  `Great pick! I've done quite a few of these. What makes yours special?`
                ];
                setTimeout(() => addMessageTyping(getRandomResponse(responses)), 400);
              }
            });

            btn.addEventListener('mouseenter', function() {
              this.style.borderColor = '#333';
              this.style.background = '#f5f5f5';
            });
            btn.addEventListener('mouseleave', function() {
              this.style.borderColor = '#ddd';
              this.style.background = '#fff';
            });
          });
        });
      }
      
      function showContactMethodToggle() {
        const toggleHtml = `
          <p>How do you prefer to be contacted?</p>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="contact-method-btn" data-method="email" style="flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all 0.2s;">📧 Email</button>
            <button class="contact-method-btn" data-method="mobile" style="flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all 0.2s;">📱 Mobile</button>
            <button class="contact-method-btn" data-method="linkedin" style="flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all 0.2s;">💼 LinkedIn</button>
          </div>
        `;
        addMessageTyping(toggleHtml, true, () => {
          document.querySelectorAll('.contact-method-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const method = this.dataset.method;
              collectedInfo.contactMethod = method;
              addMessage(this.textContent, 'user');
              state = 'asking_contact';

      function handleUserMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        chatInput.value = '';

        const lower = text.toLowerCase();
        const intent = detectIntent(text);

        // Check for small budget mention anytime
        if (smallBudgetKeywords.some(k => lower.includes(k))) {
          mentionedSmallBudget = true;
        }

        // State machine
        if (state === 'intro') {
          // Handle intro responses
          if (intent === 'funny') {
            setTimeout(() => {
              addMessageTyping(getRandomResponse(funnyResponses), false, showProjectTypes);
            }, 400);
          } else if (intent === 'rude') {
            setTimeout(() => {
              addMessageTyping(getRandomResponse(rudeResponses), false, showProjectTypes);
            }, 400);
          } else if (intent === 'compliment') {
            setTimeout(() => {
              addMessageTyping(getRandomResponse(complimentResponses), false, showProjectTypes);
            }, 400);
          } else if (intent === 'greeting') {
            setTimeout(() => {
              addMessageTyping(getRandomResponse(greetingResponses), false, showProjectTypes);
            }, 400);
          } else {
            collectedInfo.projectDetails.push(text);
            state = 'chatting';
            setTimeout(() => addMessageTyping("Interesting! " + getRandomResponse(generalFollowUps)), 400);
          }
          return;
        }

        if (state === 'select_project') {
          collectedInfo.projectDetails.push(text);
          state = 'chatting';
          setTimeout(() => addMessageTyping(getRandomResponse(generalFollowUps)), 400);
          return;
        }

        if (state === 'chatting') {
          collectedInfo.projectDetails.push(text);
          messageCount++;

          if (intent === 'funny') {
            setTimeout(() => addMessageTyping(getRandomResponse(funnyResponses)), 400);
            return;
          }

          if (intent === 'low_budget') {
            mentionedSmallBudget = true;
            setTimeout(() => addMessageTyping(getRandomResponse(lowBudgetResponses)), 400);
            return;
          }

          if (intent === 'budget') {
            state = 'asking_name';
            setTimeout(() => addMessageTyping("Good question! Quick – what's your name so I know who I'm talking to?"), 400);
            return;
          }

          // After 2 messages, start collecting info
          if (messageCount >= 2) {
            state = 'asking_name';
            setTimeout(() => addMessageTyping("Love it! Quick intro – what's your name?"), 400);
            return;
          }

          setTimeout(() => addMessageTyping(getRandomResponse(generalFollowUps)), 400);
          return;
        }

        if (state === 'asking_name') {
          collectedInfo.name = text;
          state = 'asking_brand';
          const firstName = text.split(' ')[0];
          setTimeout(() => addMessageTyping(`Great to meet you, ${firstName}! What's the brand or company called?`), 400);
          return;
        }

        if (state === 'asking_brand') {
          collectedInfo.brand = text;
          state = 'asking_role';
          setTimeout(() => addMessageTyping("And what's your role in the company?"), 400);
          return;
        }

        if (state === 'asking_role') {
          collectedInfo.role = text;
          state = 'asking_contact_method';
          setTimeout(() => showContactMethodToggle(), 400);
          return;
        }

        if (state === 'asking_contact') {
          collectedInfo.contact = text;
          state = 'asking_budget';
          setTimeout(() => addBudgetButtons(), 400);
          return;
        }

        // Default fallback
        setTimeout(() => addMessageTyping("Hmm, tell me more about that!"), 400);
      }
      
      // Event listeners
      if (chatSend) chatSend.addEventListener('click', handleUserMessage);
      if (chatInput) chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleUserMessage(); });

      // Initialize with intro message
      const initialMessage = document.querySelector('#initial-message .message-content');
      if (initialMessage) {

        `;
      }

      // Show project types after a short delay
      setTimeout(() => {
        state = 'select_project';
        showProjectTypes();
      }, 1500);
    });

        // Entrance: ease scale (natural → target) and position (where it was
        // clicked → centre) together for a smooth camera-zoom. The clip is lifted
        // in zoom-mode, so the full image shows throughout — never cut.
        if (zoom.enter < 1) {
          var p = Math.min(1, (performance.now() - zoom.t0) / ENTER_MS);
          var e = 1 - Math.pow(1 - p, 3); // ease-out cubic
          zoom.enter = zoom.enterFrom + (1 - zoom.enterFrom) * e;
          tx = zoom.B0x + (cx - zoom.B0x) * e;
          ty = zoom.B0y + (cy - zoom.B0y) * e;
        }
        hero.style.transition = 'none';
        centerBoxTo(tx, ty);
        setHeroT();
        zoom.raf = requestAnimationFrame(pinLoop);
      }

      var CAP_RESERVE = 128; // px kept clear at the bottom for the sticky caption

      function zoomInto(item, key) {
        if (zoom.active) return;
        var img = item.querySelector('img'), box = item.querySelector('.item-image');
        if (!box) return;
        // Video-backed items (e.g. DISTRICT) have no <img>; use the case study's
        // first image / hero as the still so they zoom like any other project.
        var d = key && DATA[key];
        var thumb = img ? (img.currentSrc || img.getAttribute('src'))
          : ((d && d.images && d.images[0]) || (d && d.hero) || '');
        if (!thumb) return;
        zoom.slides = carouselSlides(item, key, thumb);

        // Read the caption text before entering zoom-mode (visibility:hidden
        // would blank innerText), then pin it to the bottom of the screen.
        var small = item.querySelector('small');
        var lines = ((small ? (small.innerText || small.textContent) : '') || '').split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
        var capHtml = '';
        if (lines.length) {
          capHtml = '<span class="brand-name">' + esc(lines[0]) + '</span>';
          if (lines.length > 1) capHtml += lines.slice(1).map(esc).join('<br>');
        }
        zcap.innerHTML = '<span class="zc-inner">' + capHtml + '</span>';

        var layer = document.createElement('div');
        layer.className = 'carousel-layer';
        var cimg = document.createElement('img');
        cimg.className = 'cs-img';
        cimg.src = zoom.slides[0] || thumb;
        layer.appendChild(cimg);
        box.appendChild(layer);

        zoom.active = true; zoom.item = item; zoom.box = box; zoom.layer = layer;
        zoom.img = cimg; zoom.i = 0; zoom.locked = false; zoom.acc = 0; zoom.key = key;
        zoom.userScale = 1; zoom.settling = true;
        item.classList.add('zoomed-item');
        document.body.classList.add('zoom-mode');

        // Centre + scale on the IMAGE box (not the whole item, which includes the
        // caption text) so the picture sits dead-centre of the screen — both axes —
        // and is never cut off or pushed up/off-screen. Sized to clear the small
        // bottom-left caption so nothing overlaps.
        var r = box.getBoundingClientRect();
        var hr = hero.getBoundingClientRect(); // hero's untransformed origin
        zoom.vw = window.innerWidth; zoom.vh = window.innerHeight;
        // Height budget is symmetric around the centre so a centred image still
        // clears the caption band at the bottom.
        var maxH = Math.min(zoom.vh - 2 * CAP_RESERVE, zoom.vh - 32);
        zoom.Z = Math.min((zoom.vw * 0.86) / r.width, maxH / r.height);
        zoom.Z = Math.max(1.2, Math.min(zoom.Z, 6));
        // Work in hero-local coordinates (relative to the hero's own top-left) so
        // the transform doesn't multiply the hero's screen offset by the scale and
        // knock the image off-centre. Offset the target centre by the same origin.
        zoom.Px = (r.left - hr.left) + r.width / 2; zoom.Py = (r.top - hr.top) + r.height / 2;
        zoom.Cx = zoom.vw / 2 - hr.left; zoom.Cy = zoom.vh / 2 - hr.top;
        // Where the image sits on screen at click time — the entrance eases from
        // here to the centre.
        zoom.B0x = r.left + r.width / 2; zoom.B0y = r.top + r.height / 2;
        hero.style.transformOrigin = '0 0';
        // Entrance eases the image from its clicked position/size to the centred
        // target zoom (see pinLoop) — smooth, and never cut now the clip is lifted.
        zoom.enterFrom = Math.min(1, 1 / zoom.Z);
        zoom.enter = zoom.enterFrom;
        zoom.t0 = performance.now();
        hero.classList.add('zoomed');
        // Ignore hover-out while the entrance animation is still running.
        setTimeout(function () { zoom.settling = false; }, ENTER_MS + 120);
        zoom.raf = requestAnimationFrame(pinLoop);
      }

      // Outside-the-card close affordance: cursor → ×, a ring around it empties
      // over CLOSE_MS, then auto-closes. Cancelled the moment you re-enter.
      var closeAnim = null;
      function enterClosing() {
        if (cur.classList.contains('closing')) return;
        cur.classList.add('closing');
        if (ringProg && ringProg.animate) {
          closeAnim = ringProg.animate(
            [{ strokeDashoffset: '0px' }, { strokeDashoffset: RING_C + 'px' }],
            { duration: CLOSE_MS, easing: 'linear', fill: 'forwards' });
          closeAnim.onfinish = function () { if (zoom.active) zoomOut(); };
        } else {
          zoom.outTimer = setTimeout(function () { if (zoom.active) zoomOut(); }, CLOSE_MS);
        }
      }
      function exitClosing() {
        if (!cur.classList.contains('closing')) return;
        cur.classList.remove('closing');
        if (closeAnim) { closeAnim.cancel(); closeAnim = null; }
        if (zoom.outTimer) { clearTimeout(zoom.outTimer); zoom.outTimer = 0; }
      }

      function zoomOut() {
        if (!zoom.active) return;
        exitClosing();
        if (zoom.raf) { cancelAnimationFrame(zoom.raf); zoom.raf = 0; }
        hero.style.transition = ''; // slow settle back via the .zoomed transition
        hero.style.transform = '';
        tip.classList.remove('show');
        cur.classList.remove('locked');
        document.body.classList.remove('zoom-mode');
        var item = zoom.item, layer = zoom.layer;
        zoom.active = false; zoom.item = null; zoom.box = null; zoom.locked = false;
        zoom.layer = null; zoom.img = null; zoom.slides = [];
        setTimeout(function () {
          hero.classList.remove('zoomed');
          if (item) item.classList.remove('zoomed-item');
          if (layer && layer.parentNode) layer.remove();
        }, 1200);
      }

      function overImage(x, y) {
        if (!zoom.box) return false;
        var b = zoom.box.getBoundingClientRect();
        return x >= b.left && x <= b.right && y >= b.top && y <= b.bottom;
      }

      // Move: follow with the custom cursor and scrub the carousel by distance moved.
      window.addEventListener('mousemove', function (e) {
        if (!zoom.active) return;
        var dx = e.clientX - lastX, dy = e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
        e.stopImmediatePropagation(); // freeze the grid's own mouse handling
        if (zoom.settling) return;
        // Off the card (and not locked / pinched-in): show the × + countdown ring
        // instead of closing straight away. Re-entering the card cancels it.
        if (!zoom.locked && zoom.userScale <= 1.02) {
          if (overImage(e.clientX, e.clientY)) { exitClosing(); }
          else { enterClosing(); return; }
        }
        if (zoom.locked) {
          tip.style.left = (e.clientX + 16) + 'px'; tip.style.top = (e.clientY + 18) + 'px';
        } else {
          zoom.acc += Math.hypot(dx, dy);
          while (zoom.acc >= 45) { zoom.acc -= 45; setSlide(zoom.i + 1); } // faster cursor -> faster changes
        }
      }, true);

      // Wheel / trackpad pinch while zoomed: zoom further into the photo (1×–4×).
      window.addEventListener('wheel', function (e) {
        if (!zoom.active) return;
        e.stopImmediatePropagation(); e.preventDefault();
        var factor = Math.exp(-e.deltaY * (e.ctrlKey ? 0.012 : 0.0016)); // pinch is finer-grained
        zoom.userScale = Math.min(4, Math.max(1, zoom.userScale * factor));
        applyHero(true);
      }, { capture: true, passive: false });
      window.addEventListener('pointermove', function (e) { if (zoom.active) e.stopImmediatePropagation(); }, true);
      window.addEventListener('mousedown', function (e) { if (zoom.active) e.stopImmediatePropagation(); }, true);
      window.addEventListener('pointerdown', function (e) { if (zoom.active) e.stopImmediatePropagation(); }, true);

      // Click while zoomed: on the image -> lock/unlock + tooltip; outside -> zoom out.
      window.addEventListener('click', function (e) {
        if (!zoom.active) return;
        e.stopImmediatePropagation(); e.preventDefault();
        // If the user has pinched in, the first click steps back to base framing
        // (so there's always an "outside" to click for the full zoom-out).
        if (zoom.userScale > 1.02) {
          zoom.userScale = 1; zoom.locked = false;
          tip.classList.remove('show'); cur.classList.remove('locked');
          applyHero(true);
          return;
        }
        if (overImage(e.clientX, e.clientY)) {
          zoom.locked = !zoom.locked;
          if (zoom.locked) {
            var bn = zoom.item.querySelector('.brand-name');
            var title = (zoom.key && DATA[zoom.key]) ? zoom.key : (bn ? bn.textContent.trim() : 'Image');
            tip.innerHTML = '<strong>' + esc(title) + '</strong><span>' + (zoom.i + 1) + ' / ' + zoom.slides.length + ' · click to unlock</span>';
            tip.style.left = (e.clientX + 16) + 'px'; tip.style.top = (e.clientY + 18) + 'px';
            tip.classList.add('show'); cur.classList.add('locked');
          } else {
            tip.classList.remove('show'); cur.classList.remove('locked');
          }
        } else {
          zoomOut();
        }
      }, true);

      var grid = document.getElementById('images');
      if (!grid) return;
      var dX = 0, dY = 0, dragged = false;
      grid.addEventListener('pointerdown', function (e) { dX = e.clientX; dY = e.clientY; dragged = false; }, true);
      grid.addEventListener('pointermove', function (e) { if (Math.abs(e.clientX - dX) > 8 || Math.abs(e.clientY - dY) > 8) dragged = true; }, true);
      grid.addEventListener('click', function (e) {
        if (dragged || zoom.active) return;
        var item = e.target.closest('.item');
        if (!item || item.classList.contains('logo-item')) return;
        e.preventDefault();
        e.stopPropagation();
        lastX = e.clientX; lastY = e.clientY;
        zoomInto(item, keyForItem(item));
      }, true);

      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && zoom.active) zoomOut(); });
    })();
  </script>

  <!-- Ensure every brand logo SVG is tagged .logo-item (the bundle mis-tags the last two,
       so Verimi & Kulturstiftung des Bundes never got the light/dark colour filter). -->
  <script>
    (function () {
      var LOGOS = ["adac","adamos","amazon","amnesty-international","bitdefender","cn","coee","dso","grover","icr","knauf","lbb","leica","mensa","roland-berger","tedx","verimi","kulturstiftung-des-bundes"];
      function isLogoSrc(src) { return LOGOS.some(function (n) { return src.indexOf(n + '.svg') >= 0; }); }
      function retag() {
        document.querySelectorAll('#images .item img').forEach(function (img) {
          var src = img.getAttribute('src') || '';
          if (/\.svg($|\?)/i.test(src) && isLogoSrc(src)) {
            var box = img.closest('div');
            if (box && !box.classList.contains('logo-item')) box.classList.add('logo-item');
          }
        });
      }
      var n = 0, iv = setInterval(function () { retag(); if (++n > 20) clearInterval(iv); }, 400);
      var grid = document.getElementById('images');
      if (window.MutationObserver && grid) new MutationObserver(retag).observe(grid, { childList: true, subtree: true });
    })();
  </script>

  <!-- Instant whole-page translation (brand names excluded) -->
  <div id="google_translate_element"></div>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,de,ko,ja,es',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script>
    (function () {
      // scar.lat UI code -> Google Translate language codes
      var LANG = { en: 'en', de: 'de', kr: 'ko', jp: 'ja', es: 'es' };

      // Keep brand names / proper nouns out of translation.
      function markNoTranslate() {
        var sels = ['.brand-name', '.frame-left h1', '.frame-left h1 a', '.nav-linkedin'];
        sels.forEach(function (s) {
          document.querySelectorAll(s).forEach(function (el) {
            el.classList.add('notranslate');
            el.setAttribute('translate', 'no');
          });
        });
      }
      // Grid captions render slightly after load; mark a few times, then watch.
      var passes = 0;
      var iv = setInterval(function () { markNoTranslate(); if (++passes > 12) clearInterval(iv); }, 400);
      if (window.MutationObserver) {
        var grid = document.getElementById('images');
        if (grid) new MutationObserver(markNoTranslate).observe(grid, { childList: true, subtree: true });
      }

      // Drive the (hidden) Google widget's language <select>.
      function setGoogLang(code) {
        var tries = 0;
        var t = setInterval(function () {
          var sel = document.querySelector('select.goog-te-combo');
          if (sel) {
            clearInterval(t);
            markNoTranslate();
            sel.value = code;
            sel.dispatchEvent(new Event('change'));
          } else if (++tries > 25) {
            clearInterval(t);
          }
        }, 200);
      }

      // Slide the black pill under the active language button.
      function moveIndicator() {
        var sel = document.querySelector('.language-selector');
        if (!sel) return;
        var ind = sel.querySelector('.lang-indicator');
        var act = sel.querySelector('.lang-btn.active');
        if (!ind || !act) return;
        var sr = sel.getBoundingClientRect(), ar = act.getBoundingClientRect();
        if (!ar.width) return;
        ind.style.width = ar.width + 'px';
        ind.style.height = ar.height + 'px';
        ind.style.top = (ar.top - sr.top) + 'px';
        ind.style.transform = 'translateX(' + (ar.left - sr.left) + 'px)';
      }
      // Position it (without animation) once things have laid out.
      var mp = 0;
      var mi = setInterval(function () { moveIndicator(); if (++mp > 16) clearInterval(mi); }, 250);
      window.addEventListener('resize', moveIndicator);
      var ct = document.querySelector('.chat-toggle');
      if (ct) ct.addEventListener('click', function () { setTimeout(moveIndicator, 60); });

      // Central language switch — keeps the chat pill, the header switcher and
      // the translated page in sync. Capture phase beats the bundle's own handler.
      var LABELS = { en: 'English', de: 'Deutsch', es: 'Español', kr: '한국어', jp: '日本語' };

      // Playful reaction words per language — a little burst of hype in the
      // language you just picked, splashing out from the cursor.
      var SPLASH = {
        en: ['Wow!', 'Yes!', 'Haha', 'Cool', 'Nice one!', 'Sweet!', 'Yeah!', 'Boom!'],
        de: ['Wow!', 'Ja!', 'Haha', 'Cool', 'Super!', 'Toll!', 'Geil!', 'Yeah!'],
        es: ['¡Wow!', '¡Sí!', 'Jaja', '¡Guay!', '¡Genial!', '¡Qué bien!', '¡Olé!', '¡Bien!'],
        kr: ['와!', '좋아!', 'ㅋㅋㅋ', '대박!', '최고!', '멋져!', '좋다!', '굿!'],
        jp: ['わあ！', 'いいね！', 'ハハ', 'かっこいい！', '最高！', 'すごい！', 'やった！', '神！']
      };
      function evPoint(e, el) {
        if (e && e.clientX) return { x: e.clientX, y: e.clientY };
        var r = el.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }
      function splashWords(x, y, code) {
        var words = (SPLASH[code] || SPLASH.en).slice();
        // shuffle so the burst feels fresh each time
        for (var s = words.length - 1; s > 0; s--) { var j = Math.floor(Math.random() * (s + 1)); var t = words[s]; words[s] = words[j]; words[j] = t; }
        var n = Math.min(words.length, 8);
        for (var i = 0; i < n; i++) {
          var el = document.createElement('span');
          el.className = 'lang-splash notranslate';
          el.setAttribute('translate', 'no');
          el.textContent = words[i];
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.color = 'hsl(' + Math.round(Math.random() * 360) + ' 88% 56%)';
          el.style.fontSize = (16 + Math.random() * 12) + 'px';
          document.body.appendChild(el);
          var ang = Math.random() * Math.PI * 2;
          var dist = 70 + Math.random() * 130;
          var dx = Math.cos(ang) * dist;
          var dy = Math.sin(ang) * dist - 45; // bias upward so they "fly away"
          var rot = Math.random() * 70 - 35;
          (function (node) {
            node.animate([
              { transform: 'translate(-50%,-50%) translate(0,0) scale(.35) rotate(0deg)', opacity: 0 },
              { transform: 'translate(-50%,-50%) translate(' + (dx * .35) + 'px,' + (dy * .35) + 'px) scale(1.15) rotate(' + (rot * .5) + 'deg)', opacity: 1, offset: .28 },
              { transform: 'translate(-50%,-50%) translate(' + dx + 'px,' + dy + 'px) scale(1) rotate(' + rot + 'deg)', opacity: 0 }
            ], { duration: 950 + Math.random() * 550, delay: i * 35, easing: 'cubic-bezier(.22,1,.36,1)', fill: 'forwards' })
              .onfinish = function () { node.remove(); };
          })(el);
        }
      }

      function applyLang(code, pt) {
        document.querySelectorAll('.language-selector .lang-btn').forEach(function (b) { b.classList.toggle('active', b.dataset.lang === code); });
        moveIndicator();
        var cur = document.querySelector('.header-lang-current');
        if (cur) cur.textContent = LABELS[code] || 'EN';
        document.querySelectorAll('.header-lang-list button').forEach(function (b) { b.classList.toggle('active', b.dataset.lang === code); });
        document.querySelectorAll('.menu-lang button').forEach(function (b) { b.classList.toggle('active', b.dataset.lang === code); });
        setGoogLang(LANG[code] || 'en');
        if (pt) splashWords(pt.x, pt.y, code);
      }

      document.querySelectorAll('.language-selector .lang-btn').forEach(function (btn) {
        btn.addEventListener('click', function (e) { e.stopImmediatePropagation(); applyLang(btn.dataset.lang, evPoint(e, btn)); }, true);
      });
      document.querySelectorAll('.header-lang-list button').forEach(function (btn) {
        btn.addEventListener('click', function (e) { applyLang(btn.dataset.lang, evPoint(e, btn)); });
      });
      document.querySelectorAll('.menu-lang button').forEach(function (btn) {
        btn.addEventListener('click', function (e) { applyLang(btn.dataset.lang, evPoint(e, btn)); });
      });
    })();
  </script>

  <!-- Ambient turquoise glow + light/dark toggle -->
  <div class="glow" aria-hidden="true"></div>
  <button class="glow-orb" id="glowOrb" type="button" aria-label="Change the accent colour" title="Tap to change the accent"></button>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light / dark theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="4.2" />
      <path d="M12 2.5v2.2M12 19.3v2.2M4.6 4.6l1.6 1.6M17.8 17.8l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.6 19.4l1.6-1.6M17.8 6.2l1.6-1.6" />
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 14.2A8 8 0 0 1 9.8 4 7 7 0 1 0 20 14.2z" />
    </svg>
  </button>
  <script>
    (function () {
      // Light / dark theme toggle (sun ↔ crescent).
      var toggle = document.getElementById('themeToggle');
      if (toggle) toggle.addEventListener('click', function () {
        document.documentElement.classList.toggle('dark');
      });

      // Pressing the orb cycles the glow's colour — the site itself stays light.
      var orb = document.getElementById('glowOrb');
      var COLORS = ['#2ec4b6', '#7b6cf6', '#ff6b6b', '#f4b740', '#ff5da2', '#3a86ff'];
      var ci = 0;
      if (orb) orb.addEventListener('click', function () {
        ci = (ci + 1) % COLORS.length;
        document.documentElement.style.setProperty('--glow-color', COLORS[ci]);
      });
    })();
  </script>
</body>
